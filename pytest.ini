[pytest]
# pytest-django needs the settings module and the backend/ dir on the path so
# `config` and `tasks` import cleanly.
DJANGO_SETTINGS_MODULE = config.settings
pythonpath = backend
testpaths = backend/tests
python_files = test_*.py
python_functions = test_*

# CI-friendly reports:
#   - JUnit XML  -> test-results/junit.xml  (CircleCI store_test_results)
#   - Coverage   -> coverage.xml            (CircleCI / Codecov ingestion)
addopts =
    --verbose
    --strict-markers
    --junitxml=test-results/junit.xml
    --cov=tasks
    --cov=config
    --cov-report=xml
    --cov-report=term-missing
